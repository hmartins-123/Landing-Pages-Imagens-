<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Your Third Eye Result</title>
  
  <style>
    /* RESET E CORREÇÃO DE SCROLL (Padrão) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden !important;
      background: #000; /* Mantendo seu fundo preto */
      font-family: Arial, Helvetica, sans-serif;
      color: #fff; /* Mantendo sua cor de texto */
    }

    img, video, iframe, svg, canvas {
      max-width: 100%;
      height: auto;
    }

    .wp-site-blocks, .site, .site-content, #page, #content, #primary, #main {
      max-width: 100%;
      overflow-x: clip; 
    }

    /* ESTILOS ORIGINAIS DA SUA PÁGINA */
    /* HEADLINE */
    .headline-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 24px 16px 10px;
      background: #000;
    }
    .headline-box {
      width: 920px;
      max-width: 92vw;
      font-size: 27px;
      font-weight: 700;
      line-height: 1.35;
      color: #fff;
      text-align: center;
    }
    .red-bold {
      color: #FF2B2B;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(255,43,43,.55);
    }

    /* TOP IMAGE */
    .top-image {
      width: 100%;
      background: #000;
      text-align: center;
      padding: 8px 0 0 0;
    }
    .top-image img {
      width: 100%;
      max-width: 320px;
      display: block;
      margin: 0 auto;
    }

    /* MESSAGE BLOCK */
    .msg-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 10px 16px;
      background: #000;
    }
    .msg-box {
      width: 920px;
      max-width: 92vw;
      font-size: 18.5px;
      line-height: 1.45;
      color: #fff;
      text-align: center;
    }
    .msg-box p { margin: 0; color: #fff; }
    .green-ital-u {
      color: #39FF14;
      font-style: italic;
      font-weight: 700;
      text-decoration: underline;
      text-shadow: 0 0 10px rgba(57,255,20,.45);
    }
    .blue-no-u {
      color: #2EA8FF;
      text-decoration: none;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(46,168,255,.55);
    }
    .white-bold { color: #fff; font-weight: 700; }
    .bold { font-weight: 700; }
    .bold-ital { font-weight: 700; font-style: italic; }

    /* GIF IMAGE */
    .gif-image {
      width: 100%;
      background: #000;
      text-align: center;
      padding: 10px 0;
    }
    .gif-image img {
      width: 100%;
      display: block;
      margin: 0 auto;
    }

    /* BUTTON */
    .btn-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px 16px 30px;
      background: #000;
    }
    .pulse-button {
      background-color: #28a745;
      color: white;
      width: 100%;
      max-width: 92vw;
      padding: 22px 0;
      font-size: 26px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      animation: pulseGlow 2s infinite;
      box-shadow: 0 0 10px rgba(40,167,69,0.6);
      transition: transform 0.3s ease;
      text-align: center;
      display: block;
      font-family: Arial, Helvetica, sans-serif;
    }
    .pulse-button:hover { transform: scale(1.05); }
    @keyframes pulseGlow {
      0%   { box-shadow: 0 0 10px rgba(40,167,69,0.5), 0 0 20px rgba(40,167,69,0.4), 0 0 30px rgba(40,167,69,0.3); }
      50%  { box-shadow: 0 0 20px rgba(40,255,100,0.8), 0 0 40px rgba(40,255,100,0.5), 0 0 60px rgba(40,255,100,0.3); }
      100% { box-shadow: 0 0 10px rgba(40,167,69,0.5), 0 0 20px rgba(40,167,69,0.4), 0 0 30px rgba(40,167,69,0.3); }
    }

    /* BOTTOM LOGO */
    .bottom-logo {
      width: 100%;
      background: #000;
      text-align: center;
      padding: 10px 0 40px;
    }
    .bottom-logo img {
      width: 224px;
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 480px) {
      .headline-box { font-size: 27px; }
      .msg-box { font-size: 18.5px; }
      .pulse-button { font-size: 20px; }
    }
  </style>
