<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spiritual Quiz</title>
  <style>
    body{margin:0;padding:0;background:#000;font-family:Arial,Helvetica,sans-serif;}
    .top-image{width:100%;text-align:center;padding:40px 0 0;background:#000;overflow:hidden;}
    .top-image img{width:96%;max-width:576px;display:block;margin:0 auto;}
    .quiz-container{max-width:600px;margin:40px auto;padding:20px;text-align:center}
    .question-title{font-size:24px;color:#fff;margin-bottom:26px;font-weight:700}
    .answer-btn{background:#fff;color:#000;border:0;border-radius:15px;padding:16px 20px;font-size:16px;margin:10px 0;width:100%;cursor:pointer;text-align:left;transition:background-color .3s ease;font-family:Arial,Helvetica,sans-serif;}
    .answer-btn:hover{background:#f0f0f0}
    .input-wrap{text-align:left;margin-top:10px}
    .text-input{width:100%;box-sizing:border-box;background:#fff;border:0;border-radius:15px;padding:16px 20px;font-size:16px;outline:0;font-family:Arial,Helvetica,sans-serif;}
    .next-btn{margin-top:12px;text-align:center;font-weight:700}
    .error{color:#ff6b6b;font-size:14px;margin-top:10px;display:none;text-align:left}
    #loadingScreen{display:none;text-align:center;padding:60px 20px;background:#000;min-height:100vh;}
    #loadingScreen h2{color:#fff;font-size:22px;font-weight:700;margin-bottom:8px;}
    #loadingScreen p{color:#aaa;font-size:15px;margin-bottom:40px;}
    
    /* OPÇÃO B - ESTILOS DO LOADING */
    #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.5; }
    #loadingScreen { position: relative; overflow: hidden; }

    .progress-container{width:85%;background:#222;border-radius:20px;margin:0 auto;height:14px;overflow:hidden;}
    .progress-bar{height:100%;width:0%;background:linear-gradient(to right,#8a6a00,#c9a84c,#ffe680);border-radius:20px;transition:width .1s linear;box-shadow:0 0 8px rgba(201,168,76,0.6);}
    .loading-label{color:#c9a84c;font-size:13px;margin-top:12px;letter-spacing:2px;text-transform:uppercase;}
    @media(max-width:768px){.quiz-container{margin:20px auto;padding:10px}.question-title{font-size:20px;margin-bottom:20px}.answer-btn,.text-input{font-size:15px;padding:14px 16px}}
  </style>
</head>
<body>
  <div class="top-image">
    <img src="https://raw.githubusercontent.com/hmartins-123/Landing-Pages-Imagens-/main/Completamente%20Fechado%20Cumprimido.webp" alt="Third Eye Pyramid" fetchpriority="high" loading="eager"/>
  </div>
  
  <div class="quiz-container" id="quiz">
    <div id="questionBox" class="question-title"></div>
    <div id="answerButtons"></div>
    <div id="errorMsg" class="error"></div>
  </div>

  <div class="quiz-container" id="loadingScreen">
    <canvas id="matrixCanvas"></canvas>
    <div style="position:relative; z-index:2;">
      <h2>DECODING THE UNIVERSE</h2>
      <p>Aligning your cosmic frequency...</p>
      <div style="height:150px;"></div>
      <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
      <div class="loading-label" id="loadingLabel">Connecting...</div>
    </div>
  </div>

<script>
  const quizData=[{type:"input",key:"name",question:"What is your name?",placeholder:"Type your name here...",inputMode:"text",required:true},{type:"input",key:"dob",question:"What is your date of birth?",placeholder:"DD/MM/YYYY",inputMode:"numeric",required:false},{type:"choice",key:"wish",question:"What is the biggest wish you have — or have always wanted to come true?",answers:["💸 Become rich and financially prosperous.","❤️‍🩹 Healing for myself or someone I love.","💍 Find my true love.","✈️ Take the trip of my dreams.","🙏🏻 I don't know... I need a miracle to change my life."]},{type:"choice",question:"Have you ever felt like something is blocking your life... but you can't explain what it is?",answers:["😖 Yes, I've felt that more than once.","🥹 Maybe... but I'm not sure what it means.","😊 No, my life is perfect and everything always works out the way I want."]},{type:"choice",question:"Are you willing to live a life of miracles?",answers:["🚀 Yes, I'm ready.","🙌🏻 I'm not sure, but I want to try.","❌ I'm not interested."]}];
  let currentQuestion=0;
  const answers={name:"",dob:"",wish:"",choices:[]};
  
  function showQuestion(index){
    const qBox=document.getElementById("questionBox");
    const aBox=document.getElementById("answerButtons");
    document.getElementById("loadingScreen").style.display="none";
    const errorMsg=document.getElementById("errorMsg");
    errorMsg.style.display="none";errorMsg.textContent="";
    const q=quizData[index];
    qBox.textContent=q.question;aBox.innerHTML="";
    if(q.type==="input"){
      const wrap=document.createElement("div");wrap.className="input-wrap";
      const input=document.createElement("input");input.className="text-input";input.placeholder=q.placeholder||"";input.value=answers[q.key]||"";input.inputMode=q.inputMode||"text";input.type="text";
      if(q.key==="dob"){
        input.addEventListener("input",()=>{let v=input.value.replace(/[^\d]/g,"").slice(0,8);if(v.length>=5)v=v.slice(0,2)+"/"+v.slice(2,4)+"/"+v.slice(4);else if(v.length>=3)v=v.slice(0,2)+"/"+v.slice(2);input.value=v;});
        input.addEventListener("keydown",(e)=>{const allowed=["Backspace","Delete","ArrowLeft","ArrowRight","Tab","Home","End"];if(allowed.includes(e.key))return;if(e.key.length===1&&!/\d/.test(e.key))e.preventDefault();});
      }
      const next=document.createElement("button");next.className="answer-btn next-btn";next.textContent="Continue →";
      next.onclick=()=>{const val=(input.value||"").trim();if(q.key==="name"&&val.length<2){return showError("Please enter your name.");}answers[q.key]=val;currentQuestion++;showQuestion(currentQuestion);};
      input.addEventListener("keydown",(e)=>{if(e.key==="Enter")next.click();});
      wrap.appendChild(input);wrap.appendChild(next);aBox.appendChild(wrap);return;
    }
    q.answers.forEach(ans=>{const btn=document.createElement("button");btn.className="answer-btn";btn.textContent=ans;btn.onclick=()=>handleChoice(ans);aBox.appendChild(btn);});
  }
  
  function showError(msg){const e=document.getElementById("errorMsg");e.textContent=msg;e.style.display="block";}
  
  function handleChoice(answer){const q=quizData[currentQuestion];if(q.key==="wish")answers.wish=answer;else answers.choices.push(answer);currentQuestion++;if(currentQuestion<quizData.length)showQuestion(currentQuestion);else showLoadingScreen();}
  
  // OPÇÃO B - JS DO LOADING
  function showLoadingScreen(){
    document.getElementById("quiz").style.display="none";
    document.getElementById("loadingScreen").style.display="block";
    
    // Iniciar a Matrix
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = '👁️☥✡ॐ☯☸⚕♆✧✦✨'.split('');
    const fontSize = 22;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    
    const matrixInterval = setInterval(() => {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#c9a84c';
        ctx.font = fontSize + 'px Arial';
        for(let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }, 50);

    let width=0;
    const bar=document.getElementById("progressBar");
    const label=document.getElementById("loadingLabel");
    const interval=setInterval(()=>{
      if(width>=100){
        clearInterval(interval);
        clearInterval(matrixInterval);
        window.location.href="https://abundanceprosperity.online/presell-03-black.html";
      } else {
        width++;
        bar.style.width=width+"%";
        label.textContent = `Syncing... ${width}%`;
      }
    },30);
  }
  
  showQuestion(currentQuestion);
</script>
<script>
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
  document.addEventListener('gestureend', function(e){ e.preventDefault(); });
  document.addEventListener('touchmove', function(e){ if(e.touches.length > 1) e.preventDefault(); }, { passive: false });
</script>
</body>
</html>
